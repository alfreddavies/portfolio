<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f6f9;
      --surface:   #ffffff;
      --card:      #ffffff;
      --border:    #e2e8f0;
      --ink:       #0f172a;
      --muted:     #94a3b8;
      --accent:    #2563eb;
      --accent2:   #7c3aed;
      --green:     #16a34a;
      --green-bg:  #dcfce7;
      --red:       #dc2626;
      --red-bg:    #fee2e2;
      --yellow:    #d97706;
      --yellow-bg: #fef3c7;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 1rem 4rem;
    }

    .app-header { text-align: center; margin-bottom: 2rem; }
    .app-header .tag {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .4rem;
    }
    .app-header h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--ink);
    }
    .app-header p { color: var(--muted); font-size: .9rem; margin-top: .3rem; }

    .screen { width: 100%; max-width: 580px; }
    .screen.hidden { display: none; }

    /* START */
    .start-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .start-card .big-emoji { font-size: 4rem; margin-bottom: 1rem; }
    .start-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: .4rem; }
    .start-card p  { color: var(--muted); font-size: .88rem; margin-bottom: 1.8rem; line-height: 1.6; }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .65rem;
      margin-bottom: 1.6rem;
    }
    .cat-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: .8rem .6rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: .84rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .18s, background .18s, transform .12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
    }
    .cat-btn .cat-emoji { font-size: 1.4rem; }
    .cat-btn:hover { border-color: var(--accent); background: var(--surface); }
    .cat-btn.selected { border-color: var(--accent); background: var(--blue-bg, #dbeafe); color: var(--accent); }

    /* PRIMARY BUTTON */
    .btn-primary {
      width: 100%;
      background: var(--ink);
      border: none;
      border-radius: 11px;
      padding: .85rem 1.5rem;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
    }
    .btn-primary:hover { opacity: .85; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* LOADING */
    #loadingScreen { text-align: center; padding: 3rem 0; }
    .loader {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1.2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingScreen p { color: var(--muted); font-size: .9rem; }

    /* QUIZ */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin-bottom: 1.4rem;
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .4s ease;
    }
    .progress-label {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .score-pill {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      background: #dbeafe;
      color: var(--accent);
      border-radius: 99px;
      padding: .25rem .7rem;
      white-space: nowrap;
    }

    .question-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.6rem 1.7rem 1.4rem;
      margin-bottom: .9rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .q-category {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .5rem;
    }
    .q-difficulty {
      display: inline-block;
      font-size: .68rem;
      font-weight: 600;
      padding: .12rem .5rem;
      border-radius: 99px;
      margin-left: .45rem;
    }
    .diff-easy   { background: var(--green-bg);  color: var(--green); }
    .diff-medium { background: var(--yellow-bg); color: var(--yellow); }
    .diff-hard   { background: var(--red-bg);    color: var(--red); }

    .q-text {
      font-size: clamp(.98rem, 2.5vw, 1.15rem);
      font-weight: 600;
      line-height: 1.55;
      margin-top: .4rem;
      color: var(--ink);
    }

    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .65rem;
    }
    .ans-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: .9rem .85rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition: border-color .15s, background .15s, transform .1s;
    }
    .ans-btn:hover:not(:disabled) { border-color: var(--accent); background: #dbeafe; transform: translateY(-1px); }
    .ans-btn:disabled { cursor: default; transform: none; }
    .ans-btn.correct  { border-color: var(--green);  background: var(--green-bg);  color: var(--green); }
    .ans-btn.wrong    { border-color: var(--red);    background: var(--red-bg);    color: var(--red); }
    .ans-btn.revealed { border-color: #86efac; background: #f0fdf4; }

    .feedback {
      display: none;
      border-radius: 11px;
      padding: .8rem 1rem;
      font-size: .88rem;
      font-weight: 500;
      margin-top: .65rem;
      animation: fadeUp .2s ease both;
    }
    .feedback.correct-fb { background: var(--green-bg); color: var(--green); border: 1.5px solid #86efac; }
    .feedback.wrong-fb   { background: var(--red-bg);   color: var(--red);   border: 1.5px solid #fca5a5; }

    .next-row { margin-top: .9rem; display: none; }

    /* RESULT */
    .result-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      animation: fadeUp .4s ease both;
    }
    .result-emoji { font-size: 3.8rem; margin-bottom: .7rem; }
    .result-card h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: .3rem; }
    .result-score {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -.04em;
      line-height: 1.1;
      margin: .4rem 0;
    }
    .result-sub { color: var(--muted); font-size: .88rem; margin-bottom: 1.8rem; }

    .result-breakdown {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: .7rem;
      margin-bottom: 1.8rem;
    }
    .breakdown-item {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: .85rem .5rem;
    }
    .breakdown-val { font-size: 1.4rem; font-weight: 700; margin-bottom: .2rem; }
    .breakdown-lbl { font-size: .7rem; color: var(--muted); }
    .green-val  { color: var(--green); }
    .red-val    { color: var(--red); }
    .accent-val { color: var(--accent); }

    @media (max-width: 420px) {
      .answers-grid  { grid-template-columns: 1fr; }
      .category-grid { grid-template-columns: 1fr 1fr; }
      .question-card { padding: 1.2rem; }
    }

    /* ── THEME TOGGLE BUTTON ── */
    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 999;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: .38rem .85rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: background .2s, border-color .2s, color .2s;
      font-family: inherit;
    }
    .theme-toggle:hover { border-color: var(--accent); }

    /* ── DARK THEME OVERRIDES ── */
    [data-theme="dark"] {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --card:      #1e293b;
      --border:    #334155;
      --ink:       #f1f5f9;
      --muted:     #64748b;
      --green-bg:  #14532d;
      --red-bg:    #450a0a;
      --yellow-bg: #451a03;
      --blue-bg:   #1e3a5f;
    }
    [data-theme="dark"] .theme-toggle {
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙 Dark</button>


<div class="app-header">
  <div class="tag">5 Questions · Multiple Choice</div>
  <h1>QuizTime</h1>
  <p>Pick a category and test your knowledge</p>
</div>

<!-- START -->
<div class="screen" id="startScreen">
  <div class="start-card">
    <div class="big-emoji">🧠</div>
    <h2>Ready to play?</h2>
    <p>Choose a category, then answer 5 questions.<br>Each correct answer scores a point.</p>
    <div class="category-grid" id="categoryGrid">
      <button class="cat-btn selected" data-id="9"><span class="cat-emoji">🌍</span> General Knowledge</button>
      <button class="cat-btn" data-id="17"><span class="cat-emoji">🔬</span> Science & Nature</button>
      <button class="cat-btn" data-id="18"><span class="cat-emoji">💻</span> Computers</button>
      <button class="cat-btn" data-id="23"><span class="cat-emoji">📜</span> History</button>
      <button class="cat-btn" data-id="27"><span class="cat-emoji">🐾</span> Animals</button>
      <button class="cat-btn" data-id="22"><span class="cat-emoji">🌐</span> Geography</button>
    </div>
    <button class="btn-primary" id="startBtn">Start Quiz →</button>
  </div>
</div>

<!-- LOADING -->
<div class="screen hidden" id="loadingScreen">
  <div class="loader"></div>
  <p>Fetching your questions…</p>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quizScreen">
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">1 / 5</div>
    <div class="score-pill" id="scorePill">Score: 0</div>
  </div>
  <div class="question-card" id="questionCard">
    <div class="q-category" id="qCategory">—</div>
    <div class="q-text" id="qText">—</div>
  </div>
  <div class="answers-grid" id="answersGrid"></div>
  <div class="feedback" id="feedback"></div>
  <div class="next-row" id="nextRow">
    <button class="btn-primary" id="nextBtn">Next Question →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="resultScreen">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <h2 id="resultTitle">Well done!</h2>
    <div class="result-score" id="resultScore">0/5</div>
    <div class="result-sub">Here's how you did:</div>
    <div class="result-breakdown">
      <div class="breakdown-item">
        <div class="breakdown-val green-val"  id="bdCorrect">0</div>
        <div class="breakdown-lbl">Correct</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-val red-val"    id="bdWrong">0</div>
        <div class="breakdown-lbl">Wrong</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-val accent-val" id="bdPct">0%</div>
        <div class="breakdown-lbl">Accuracy</div>
      </div>
    </div>
    <button class="btn-primary" id="retryBtn">Play Again →</button>
  </div>
</div>

<script>
  let questions = [], current = 0, score = 0, answered = false, selectedCategory = 9;

  const screens = {
    start:   document.getElementById('startScreen'),
    loading: document.getElementById('loadingScreen'),
    quiz:    document.getElementById('quizScreen'),
    result:  document.getElementById('resultScreen'),
  };
  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.add('hidden'));
    screens[name].classList.remove('hidden');
  }

  document.getElementById('categoryGrid').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCategory = btn.dataset.id;
  });

  async function fetchQuestions() {
    const res  = await fetch(`https://opentdb.com/api.php?amount=5&category=${selectedCategory}&type=multiple`);
    const data = await res.json();
    if (data.response_code !== 0) throw new Error('Could not load questions. Try again.');
    return data.results;
  }

  function decodeHTML(str) {
    const t = document.createElement('textarea');
    t.innerHTML = str;
    return t.value;
  }
  function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }

  function renderQuestion() {
    answered = false;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('nextRow').style.display  = 'none';
    const q   = questions[current];
    const pct = (current / 5) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${current+1} / 5`;
    document.getElementById('scorePill').textContent     = `Score: ${score}`;
    const diffClass = { easy:'diff-easy', medium:'diff-medium', hard:'diff-hard' }[q.difficulty] || '';
    document.getElementById('qCategory').innerHTML =
      decodeHTML(q.category) + `<span class="q-difficulty ${diffClass}">${q.difficulty}</span>`;
    document.getElementById('qText').textContent = decodeHTML(q.question);
    const card = document.getElementById('questionCard');
    card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
    const answers = shuffle([q.correct_answer, ...q.incorrect_answers]);
    const grid = document.getElementById('answersGrid');
    grid.innerHTML = '';
    answers.forEach(ans => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = decodeHTML(ans);
      btn.dataset.answer = ans;
      btn.addEventListener('click', () => handleAnswer(btn, q.correct_answer));
      grid.appendChild(btn);
    });
  }

  function handleAnswer(clickedBtn, correct) {
    if (answered) return;
    answered = true;
    document.querySelectorAll('.ans-btn').forEach(b => {
      b.disabled = true;
      if (b.dataset.answer === correct) b.classList.add('correct');
      else b.classList.add('revealed');
    });
    const fb = document.getElementById('feedback');
    if (clickedBtn.dataset.answer === correct) {
      score++;
      clickedBtn.classList.remove('revealed'); clickedBtn.classList.add('correct');
      fb.className = 'feedback correct-fb';
      fb.textContent = '✓ Correct! Well done.';
    } else {
      clickedBtn.classList.remove('revealed'); clickedBtn.classList.add('wrong');
      fb.className = 'feedback wrong-fb';
      fb.textContent = `✗ Wrong. The answer was: ${decodeHTML(correct)}`;
    }
    fb.style.display = 'block';
    document.getElementById('scorePill').textContent = `Score: ${score}`;
    document.getElementById('nextRow').style.display = 'block';
    document.getElementById('nextBtn').textContent = current < 4 ? 'Next Question →' : 'See Results →';
  }

  function showResult() {
    const pct    = Math.round((score/5)*100);
    const emojis = ['😬','😕','🙂','😊','🎉','🏆'];
    const titles = ['Keep practising!','Not bad!','Good effort!','Nice work!','Great job!','Perfect score!'];
    document.getElementById('resultEmoji').textContent  = emojis[score];
    document.getElementById('resultTitle').textContent  = titles[score];
    document.getElementById('resultScore').textContent  = `${score}/5`;
    document.getElementById('bdCorrect').textContent    = score;
    document.getElementById('bdWrong').textContent      = 5-score;
    document.getElementById('bdPct').textContent        = pct + '%';
    showScreen('result');
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    current++;
    if (current < 5) renderQuestion(); else showResult();
  });

  async function startQuiz() {
    showScreen('loading');
    try {
      questions = await fetchQuestions();
      current = 0; score = 0;
      showScreen('quiz');
      renderQuestion();
    } catch(err) {
      showScreen('start');
      alert('⚠️ ' + err.message);
    }
  }

  document.getElementById('startBtn').addEventListener('click', startQuiz);
  document.getElementById('retryBtn').addEventListener('click', () => showScreen('start'));


  // ── Theme toggle ──
  (function() {
    var saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    function updateBtn() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var btn  = document.getElementById('themeToggle');
      if (btn) btn.innerHTML = dark ? '&#9728;&#65039; Light' : '&#127769; Dark';
    }
    document.addEventListener('DOMContentLoaded', function() {
      updateBtn();
      var btn = document.getElementById('themeToggle');
      if (btn) btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateBtn();
      });
    });
  })();

</script>
</body>
</html>
