<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f6f9;
      --surface:   #ffffff;
      --card:      #ffffff;
      --border:    #e2e8f0;
      --ink:       #0f172a;
      --muted:     #94a3b8;
      --accent:    #2563eb;
      --accent2:   #7c3aed;
      --green:     #16a34a;
      --green-bg:  #dcfce7;
      --red:       #dc2626;
      --red-bg:    #fee2e2;
      --yellow:    #d97706;
      --yellow-bg: #fef3c7;
      --blue-bg:   #dbeafe;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .4rem;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--ink);
    }
    header p { color: var(--muted); font-size: .9rem; margin-top: .3rem; }

    .search-row {
      display: flex;
      gap: .6rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
    }
    .search-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }
    .search-row button {
      background: var(--ink);
      border: none;
      border-radius: 10px;
      padding: .75rem 1.4rem;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      white-space: nowrap;
    }
    .search-row button:hover { opacity: .85; transform: translateY(-1px); }
    .search-row button:active { transform: translateY(0); }

    .spinner {
      display: none;
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      display: none;
      background: var(--red-bg);
      border: 1.5px solid #fca5a5;
      border-radius: 12px;
      padding: 1rem 1.4rem;
      color: var(--red);
      font-size: .9rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .weather-panel {
      display: none;
      width: 100%;
      max-width: 680px;
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Hero card */
    .hero-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 2rem 2rem 1.8rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .city-name {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .2rem;
    }
    .condition-label { font-size: .85rem; color: var(--muted); margin-bottom: 1.2rem; }

    .temp-row { display: flex; align-items: center; gap: 1rem; }
    .emoji-big { font-size: 3.8rem; line-height: 1; }
    .temp-val {
      font-size: clamp(3.2rem, 10vw, 5rem);
      font-weight: 700;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -.04em;
    }
    .temp-unit { font-size: 1.6rem; color: var(--muted); font-weight: 300; align-self: flex-start; margin-top: .5rem; }

    .feels-bar-wrap { margin-top: 1.4rem; }
    .feels-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    .feels-bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .feels-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .6s ease;
    }

    /* Stat cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: .8rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .25rem;
      box-shadow: 0 1px 6px rgba(0,0,0,.04);
    }
    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-icon { font-size: 1.2rem; margin-bottom: .1rem; }
    .stat-val { font-size: 1.45rem; font-weight: 700; color: var(--ink); }
    .stat-sub { font-size: .75rem; color: var(--muted); }

    footer {
      margin-top: 2.5rem;
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 480px) {
      .hero-card { padding: 1.4rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ── THEME TOGGLE BUTTON ── */
    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 999;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: .38rem .85rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: background .2s, border-color .2s, color .2s;
      font-family: inherit;
    }
    .theme-toggle:hover { border-color: var(--accent); }

    /* ── DARK THEME OVERRIDES ── */
    [data-theme="dark"] {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --card:      #1e293b;
      --border:    #334155;
      --ink:       #f1f5f9;
      --muted:     #64748b;
      --green-bg:  #14532d;
      --red-bg:    #450a0a;
      --yellow-bg: #451a03;
      --blue-bg:   #1e3a5f;
    }
    [data-theme="dark"] .theme-toggle {
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙 Dark</button>


  <header>
    <div class="eyebrow">Real-time data · Open-Meteo</div>
    <h1>Weather Dashboard</h1>
    <p>Search any city to get live conditions</p>
  </header>

  <div class="search-row">
    <input id="cityInput" type="text" placeholder="e.g. Thrissur, London, Tokyo…" />
    <button id="searchBtn">Search</button>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="error-box" id="errorBox"></div>

  <div class="weather-panel" id="weatherPanel">
    <div class="hero-card">
      <div class="city-name" id="cityDisplay">—</div>
      <div class="condition-label" id="conditionLabel">—</div>
      <div class="temp-row">
        <div class="emoji-big" id="weatherEmoji">🌤️</div>
        <div>
          <div style="display:flex;align-items:flex-start;gap:.2rem">
            <div class="temp-val" id="tempVal">—</div>
            <div class="temp-unit">°C</div>
          </div>
        </div>
      </div>
      <div class="feels-bar-wrap">
        <div class="feels-bar-label">
          <span>Feels like <strong id="feelsLike">—</strong>°C</span>
          <span id="feelsNote">—</span>
        </div>
        <div class="feels-bar-track"><div class="feels-bar-fill" id="feelsBar" style="width:50%"></div></div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">💧</div>
        <div class="stat-label">Humidity</div>
        <div class="stat-val" id="humidity">—</div>
        <div class="stat-sub">relative %</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💨</div>
        <div class="stat-label">Wind Speed</div>
        <div class="stat-val" id="wind">—</div>
        <div class="stat-sub">km/h</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🧭</div>
        <div class="stat-label">Wind Direction</div>
        <div class="stat-val" id="windDir">—</div>
        <div class="stat-sub">degrees</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌂</div>
        <div class="stat-label">Precipitation</div>
        <div class="stat-val" id="precip">—</div>
        <div class="stat-sub">mm</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">☁️</div>
        <div class="stat-label">Cloud Cover</div>
        <div class="stat-val" id="cloud">—</div>
        <div class="stat-sub">%</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-label">Visibility</div>
        <div class="stat-val" id="visibility">—</div>
        <div class="stat-sub">km</div>
      </div>
    </div>
  </div>

  <footer>
    Powered by <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &amp;
    <a href="https://nominatim.openstreetmap.org" target="_blank">OpenStreetMap Nominatim</a>
  </footer>

  <script>
    const WMO = {
      0:  ['Clear sky','☀️'], 1:['Mainly clear','🌤️'], 2:['Partly cloudy','⛅'],
      3:  ['Overcast','☁️'], 45:['Foggy','🌫️'], 48:['Icy fog','🌫️'],
      51: ['Light drizzle','🌦️'], 53:['Moderate drizzle','🌦️'], 55:['Dense drizzle','🌧️'],
      61: ['Slight rain','🌧️'], 63:['Moderate rain','🌧️'], 65:['Heavy rain','🌧️'],
      71: ['Slight snow','🌨️'], 73:['Moderate snow','🌨️'], 75:['Heavy snow','❄️'],
      77: ['Snow grains','🌨️'], 80:['Slight showers','🌦️'], 81:['Moderate showers','🌧️'],
      82: ['Violent showers','⛈️'], 85:['Slight snow shower','🌨️'], 86:['Heavy snow shower','❄️'],
      95: ['Thunderstorm','⛈️'], 96:['Thunderstorm + hail','⛈️'], 99:['Thunderstorm + hail','⛈️'],
    };

    function windDirLabel(deg) {
      return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
    }
    function feelsNote(actual, feels) {
      const d = feels - actual;
      if (d > 2) return 'Warmer than it looks';
      if (d < -2) return 'Colder than it looks';
      return 'Matches the temperature';
    }
    function show(el) { el.style.display = 'block'; }
    function hide(el) { el.style.display = 'none'; }
    function setText(id, val) { document.getElementById(id).textContent = val; }

    async function geocode(city) {
      const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`, { headers: {'Accept-Language':'en'} });
      const data = await res.json();
      if (!data.length) throw new Error(`City "${city}" not found. Try a different spelling.`);
      return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), name: data[0].display_name.split(',').slice(0,2).join(', ') };
    }

    async function fetchWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
        + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,`
        + `wind_speed_10m,wind_direction_10m,precipitation,cloud_cover,visibility`
        + `&wind_speed_unit=kmh&timezone=auto`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Weather service unavailable. Try again shortly.');
      return res.json();
    }

    async function search(city) {
      const spinner  = document.getElementById('spinner');
      const errorBox = document.getElementById('errorBox');
      const panel    = document.getElementById('weatherPanel');
      hide(errorBox); hide(panel); show(spinner);
      try {
        const { lat, lon, name } = await geocode(city);
        const data = await fetchWeather(lat, lon);
        const c = data.current;
        const [condition, emoji] = WMO[c.weather_code] ?? ['Unknown','🌡️'];
        const temp   = Math.round(c.temperature_2m);
        const feels  = Math.round(c.apparent_temperature);
        const barPct = Math.min(100, Math.max(0, ((feels+20)/60)*100));

        setText('cityDisplay',   name.toUpperCase());
        setText('conditionLabel', condition);
        setText('tempVal',       temp);
        setText('weatherEmoji',  emoji);
        setText('feelsLike',     feels);
        setText('feelsNote',     feelsNote(temp, feels));
        document.getElementById('feelsBar').style.width = barPct + '%';
        setText('humidity',    c.relative_humidity_2m + '%');
        setText('wind',        Math.round(c.wind_speed_10m));
        setText('windDir',     windDirLabel(c.wind_direction_10m));
        setText('precip',      c.precipitation.toFixed(1));
        setText('cloud',       c.cloud_cover + '%');
        setText('visibility',  (c.visibility/1000).toFixed(1));

        hide(spinner); show(panel);
        panel.style.animation = 'none'; panel.offsetHeight; panel.style.animation = '';
      } catch(err) {
        hide(spinner);
        errorBox.textContent = '⚠️ ' + err.message;
        show(errorBox);
      }
    }

    document.getElementById('searchBtn').addEventListener('click', () => {
      const city = document.getElementById('cityInput').value.trim();
      if (city) search(city);
    });
    document.getElementById('cityInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    search('Thrissur');
  

  // ── Theme toggle ──
  (function() {
    var saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    function updateBtn() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var btn  = document.getElementById('themeToggle');
      if (btn) btn.innerHTML = dark ? '&#9728;&#65039; Light' : '&#127769; Dark';
    }
    document.addEventListener('DOMContentLoaded', function() {
      updateBtn();
      var btn = document.getElementById('themeToggle');
      if (btn) btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateBtn();
      });
    });
  })();

</script>
</body>
</html>
