<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joke & Quote Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #fafaf7;
      --surface:  #ffffff;
      --border:   #e8e5de;
      --ink:      #1a1a18;
      --muted:    #8a8880;
      --accent:   #e85d26;
      --accent2:  #f5a623;
      --tag-bg:   #f0ede6;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 5rem;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header-eyebrow {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: .6rem;
    }
    header h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
      letter-spacing: -.02em;
    }
    header h1 em {
      font-style: italic;
      color: var(--accent);
    }
    header p {
      color: var(--muted);
      font-size: .9rem;
      margin-top: .5rem;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--tag-bg);
      border-radius: 12px;
      padding: .3rem;
      margin-bottom: 1.8rem;
      gap: .2rem;
      width: 100%;
      max-width: 420px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 9px;
      padding: .6rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: .88rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── CATEGORY FILTERS ── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 2rem;
      max-width: 520px;
      width: 100%;
    }
    .filter-chip {
      background: var(--tag-bg);
      border: 1.5px solid transparent;
      border-radius: 99px;
      padding: .35rem .9rem;
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .18s, color .18s, background .18s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── CONTENT CARD ── */
    .content-wrap {
      width: 100%;
      max-width: 520px;
    }

    .content-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2.2rem 2rem;
      margin-bottom: 1.2rem;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: opacity .3s ease;
    }
    .content-card::before {
      content: '\201C';
      font-family: 'Lora', serif;
      font-size: 8rem;
      color: var(--tag-bg);
      position: absolute;
      top: -1.5rem;
      left: 1rem;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .content-card.fading { opacity: 0; }

    .content-tag {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      position: relative;
    }

    /* Joke layout */
    .joke-setup {
      font-family: 'Lora', serif;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 600;
      line-height: 1.55;
      color: var(--ink);
      margin-bottom: 1.2rem;
      position: relative;
    }
    .joke-punchline-wrap {
      border-top: 1.5px dashed var(--border);
      padding-top: 1rem;
      display: none;
    }
    .joke-punchline-wrap.visible { display: block; }
    .punchline-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    .joke-punchline {
      font-family: 'Lora', serif;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-style: italic;
      color: var(--accent);
      line-height: 1.5;
    }

    /* Single / quote text */
    .main-text {
      font-family: 'Lora', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 400;
      line-height: 1.65;
      color: var(--ink);
      position: relative;
    }
    .quote-author {
      margin-top: 1.2rem;
      font-size: .85rem;
      font-weight: 500;
      color: var(--muted);
      display: none;
    }
    .quote-author.visible { display: block; }
    .quote-author span { color: var(--ink); font-weight: 600; }

    /* Reveal / fetch buttons */
    .btn-row {
      display: flex;
      gap: .7rem;
    }
    .btn-reveal {
      flex: 1;
      background: var(--tag-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: .8rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      transition: background .18s, border-color .18s;
      display: none;
    }
    .btn-reveal.visible { display: block; }
    .btn-reveal:hover { background: #e8e4dc; border-color: #ccc; }

    .btn-fetch {
      flex: 1;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: .8rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
    }
    .btn-fetch:hover { opacity: .88; transform: translateY(-1px); }
    .btn-fetch:active { transform: translateY(0); }
    .btn-fetch:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* Loading state */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .loading-dots span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: dot .9s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes dot {
      0%, 80%, 100% { transform: scale(.6); opacity: .4; }
      40%            { transform: scale(1);  opacity: 1; }
    }

    /* Error */
    .error-msg {
      display: none;
      color: #c0392b;
      background: #fdf0ee;
      border: 1.5px solid #f5c6c0;
      border-radius: 10px;
      padding: .7rem 1rem;
      font-size: .85rem;
      margin-bottom: .8rem;
    }

    /* Counter */
    .counter {
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      margin-top: .5rem;
    }
    .counter strong { color: var(--ink); }

    @media (max-width: 400px) {
      .content-card { padding: 1.8rem 1.4rem 1.5rem; }
    }

    /* ── THEME TOGGLE BUTTON ── */
    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 999;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: .38rem .85rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: background .2s, border-color .2s, color .2s;
      font-family: inherit;
    }
    .theme-toggle:hover { border-color: var(--accent); }

    /* ── DARK THEME OVERRIDES ── */
    [data-theme="dark"] {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --card:      #1e293b;
      --border:    #334155;
      --ink:       #f1f5f9;
      --muted:     #64748b;
      --green-bg:  #14532d;
      --red-bg:    #450a0a;
      --yellow-bg: #451a03;
      --blue-bg:   #1e3a5f;
    }
    [data-theme="dark"] .theme-toggle {
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙 Dark</button>


<header>
  <div class="header-eyebrow">Jokes · Quotes · Laughs</div>
  <h1>Daily <em>Dose</em></h1>
  <p>Fresh jokes and quotes, on demand</p>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" data-tab="joke">😄 Jokes</button>
  <button class="tab-btn" data-tab="quote">💬 Quotes</button>
</div>

<!-- FILTERS -->
<div class="filter-row" id="filterRow">
  <!-- populated by JS -->
</div>

<div class="content-wrap">
  <div class="error-msg" id="errorMsg"></div>

  <div class="content-card" id="contentCard">
    <div class="content-tag" id="contentTag">Programming</div>
    <div class="joke-setup"  id="jokeSetup">Why do programmers prefer dark mode?</div>
    <div class="joke-punchline-wrap" id="punchlineWrap">
      <div class="punchline-label">Punchline</div>
      <div class="joke-punchline" id="jokePunchline">Because light attracts bugs!</div>
    </div>
    <div class="main-text"   id="mainText" style="display:none"></div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

  <div class="btn-row">
    <button class="btn-reveal" id="revealBtn">👀 Reveal punchline</button>
    <button class="btn-fetch"  id="fetchBtn">✨ New joke</button>
  </div>

  <div class="counter" id="counter">Joke <strong>#1</strong> loaded</div>
</div>

<script>
  // ── Config ──
  const JOKE_CATS  = ['Programming', 'Misc', 'Pun', 'Spooky', 'Christmas'];
  const QUOTE_CATS = ['inspiration', 'life', 'humor', 'wisdom', 'friendship'];

  let mode        = 'joke';
  let jokeCount   = 1;
  let quoteCount  = 1;
  let activeJokeCat  = 'Programming';
  let activeQuoteCat = 'inspiration';
  let punchlineRevealed = false;

  // ── Elements ──
  const filterRow    = document.getElementById('filterRow');
  const contentCard  = document.getElementById('contentCard');
  const contentTag   = document.getElementById('contentTag');
  const jokeSetup    = document.getElementById('jokeSetup');
  const punchlineWrap= document.getElementById('punchlineWrap');
  const jokePunchline= document.getElementById('jokePunchline');
  const mainText     = document.getElementById('mainText');
  const quoteAuthor  = document.getElementById('quoteAuthor');
  const revealBtn    = document.getElementById('revealBtn');
  const fetchBtn     = document.getElementById('fetchBtn');
  const counter      = document.getElementById('counter');
  const errorMsg     = document.getElementById('errorMsg');

  // ── Build filters ──
  function buildFilters() {
    filterRow.innerHTML = '';
    const cats = mode === 'joke' ? JOKE_CATS : QUOTE_CATS;
    const active = mode === 'joke' ? activeJokeCat : activeQuoteCat;
    cats.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (cat === active ? ' active' : '');
      chip.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      chip.addEventListener('click', () => {
        if (mode === 'joke') activeJokeCat = cat;
        else activeQuoteCat = cat;
        buildFilters();
        fetchContent();
      });
      filterRow.appendChild(chip);
    });
  }

  // ── Tab switching ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.tab;
      buildFilters();
      fetchContent();
      fetchBtn.textContent = mode === 'joke' ? '✨ New joke' : '✨ New quote';
    });
  });

  // ── Fetch joke ──
  async function fetchJoke() {
    const url = `https://v2.jokeapi.dev/joke/${activeJokeCat}?blacklistFlags=nsfw,racist,sexist`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.message || 'Could not load a joke.');
    return data;
  }

  // ── Fetch quote (quotable.io) ──
  async function fetchQuote() {
    const tagMap = {
      inspiration: 'inspirational',
      life: 'life',
      humor: 'humor',
      wisdom: 'wisdom',
      friendship: 'friendship'
    };
    const tag = tagMap[activeQuoteCat] || 'life';
    const url = `https://api.quotable.io/quotes/random?tags=${tag}&limit=1`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!data || !data.length) throw new Error('No quote found for this category.');
    return data[0];
  }

  // ── Render joke ──
  function renderJoke(data) {
    punchlineRevealed = false;
    contentTag.textContent = data.category || activeJokeCat;

    jokeSetup.style.display    = '';
    punchlineWrap.style.display = '';
    mainText.style.display     = 'none';
    quoteAuthor.classList.remove('visible');

    if (data.type === 'twopart') {
      jokeSetup.textContent = data.setup;
      jokePunchline.textContent = data.delivery;
      punchlineWrap.classList.remove('visible');
      revealBtn.classList.add('visible');
    } else {
      jokeSetup.textContent = data.joke;
      punchlineWrap.classList.remove('visible');
      revealBtn.classList.remove('visible');
    }

    jokeCount++;
    counter.innerHTML = `Joke <strong>#${jokeCount - 1}</strong> loaded`;
  }

  // ── Render quote ──
  function renderQuote(data) {
    jokeSetup.style.display     = 'none';
    punchlineWrap.style.display = 'none';
    revealBtn.classList.remove('visible');
    mainText.style.display      = '';

    mainText.textContent = data.content || data.text || '';
    quoteAuthor.innerHTML = `— <span>${data.author || 'Unknown'}</span>`;
    quoteAuthor.classList.add('visible');

    quoteCount++;
    counter.innerHTML = `Quote <strong>#${quoteCount - 1}</strong> loaded`;
  }

  // ── Fade + fetch ──
  async function fetchContent() {
    errorMsg.style.display = 'none';
    fetchBtn.disabled = true;
    revealBtn.classList.remove('visible');

    contentCard.classList.add('fading');
    await new Promise(r => setTimeout(r, 280));

    try {
      if (mode === 'joke') {
        const data = await fetchJoke();
        renderJoke(data);
      } else {
        const data = await fetchQuote();
        renderQuote(data);
      }
    } catch (err) {
      errorMsg.textContent = '⚠️ ' + err.message;
      errorMsg.style.display = 'block';
    }

    contentCard.classList.remove('fading');
    fetchBtn.disabled = false;
  }

  // ── Reveal punchline ──
  revealBtn.addEventListener('click', () => {
    punchlineWrap.classList.add('visible');
    revealBtn.classList.remove('visible');
  });

  // ── Fetch button ──
  fetchBtn.addEventListener('click', fetchContent);

  // ── Init ──
  buildFilters();
  // Show default on load without fetch (already pre-rendered)
  punchlineWrap.classList.add('visible');


  // ── Theme toggle ──
  (function() {
    var saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    function updateBtn() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var btn  = document.getElementById('themeToggle');
      if (btn) btn.innerHTML = dark ? '&#9728;&#65039; Light' : '&#127769; Dark';
    }
    document.addEventListener('DOMContentLoaded', function() {
      updateBtn();
      var btn = document.getElementById('themeToggle');
      if (btn) btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateBtn();
      });
    });
  })();

</script>
</body>
</html>
